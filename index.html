<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check your Password Strength</title>
</head>
<body>
    <h1>Password Strength Checker</h1>
    <p>This website checks the strength of your password, just enter a password to get started.</p>
    <p>&#9888; <em>We do not store any data. Password you enter is not saved.</em></p>
    
    <fieldset>
        <legend>Enter your Password</legend>
        <input type="password" name="password" id="password-field" placeholder="enter password">
        <button type="button" id="show-password-button">Show Password</button>
        <p id="password-strength-field"></p>
    </fieldset>

    <h2 id="suggestions-heading" style="display: none;">Suggested Improvements to your password</h2>
    <p id="suggestions-field"></p>
</body>

<script src="./script.js"></script>
</html>
